name: Work Documentation Check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: work-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-work-docs:
    name: Work-slice documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check work documentation
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/check-work-documentation.mjs
